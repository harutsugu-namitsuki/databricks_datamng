<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>操作トレース可視化システム — UIモックアップ</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2230; --line:#30363d;
    --txt:#e6edf3; --muted:#8b949e; --accent:#58a6ff;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic UI",sans-serif;}
  header{padding:14px 20px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:18px;flex-wrap:wrap;background:#0b0f14}
  header h1{font-size:17px;margin:0;font-weight:600}
  header .tag{font-size:11px;color:var(--muted);border:1px solid var(--line);
    padding:2px 8px;border-radius:10px}
  .modes{display:flex;gap:6px;margin-left:auto}
  .modes button,.windows button,.actions button{
    background:var(--panel2);color:var(--txt);border:1px solid var(--line);
    padding:6px 12px;border-radius:7px;cursor:pointer;font-size:13px}
  .modes button.on{background:var(--accent);color:#0b0f14;border-color:var(--accent);font-weight:600}
  .windows button.on{background:#d29922;color:#0b0f14;border-color:#d29922;font-weight:600}
  .toolbar{padding:10px 20px;border-bottom:1px solid var(--line);
    display:flex;gap:14px;align-items:center;flex-wrap:wrap;background:#0b0f14}
  .toolbar .grp{display:flex;gap:6px;align-items:center}
  .toolbar .lbl{font-size:12px;color:var(--muted);margin-right:4px}
  .actions button:hover{border-color:var(--accent)}
  main{display:flex;height:calc(100vh - 118px)}
  .stage{position:relative;flex:1;overflow:hidden}
  #svg{position:absolute;inset:0;width:100%;height:100%}
  #fx{position:absolute;inset:0;pointer-events:none}
  aside{width:330px;border-left:1px solid var(--line);background:var(--panel);
    padding:16px;overflow:auto}
  aside h2{font-size:13px;color:var(--muted);text-transform:uppercase;
    letter-spacing:.05em;margin:0 0 8px}
  .detail{font-size:13px;line-height:1.7}
  .detail .k{color:var(--muted)}
  .detail code{background:#0b0f14;border:1px solid var(--line);border-radius:4px;
    padding:1px 5px;font-size:12px;color:#a5d6ff}
  .detail .title{font-size:16px;font-weight:700;margin:4px 0 10px}
  .onebox{background:#13202b;border:1px solid #234;border-left:3px solid var(--accent);
    border-radius:0 7px 7px 0;padding:8px 10px;font-size:13.5px;margin-bottom:10px}
  .easy{font-size:13px;line-height:1.85;margin:8px 0}
  .term{border-bottom:1px dotted #d29922;color:#f0c674;cursor:help}
  .glossary{margin-top:12px;background:#0b0f14;border:1px solid var(--line);
    border-radius:7px;padding:8px 10px}
  .glossary .gh{font-size:11px;color:var(--muted);text-transform:uppercase;
    letter-spacing:.05em;margin-bottom:5px}
  .glossary dl{margin:0}
  .glossary dt{font-weight:700;color:#f0c674;font-size:12.5px;margin-top:6px}
  .glossary dt .read{color:var(--muted);font-weight:400;font-size:10.5px;margin-left:5px}
  .glossary dd{margin:1px 0 0;font-size:12px;color:var(--txt);line-height:1.6}
  .metrics{margin-top:10px;font-size:11px;color:var(--muted);
    border-top:1px dashed var(--line);padding-top:8px}
  .sql{background:#0b0f14;border:1px solid var(--line);border-radius:6px;padding:8px;
    font-family:Consolas,monospace;font-size:11.5px;color:#7ee787;white-space:pre-wrap;
    margin-top:6px;line-height:1.5}
  .trace-log{margin-top:18px}
  .trace-step{font-size:12px;padding:5px 8px;border-left:2px solid var(--line);
    margin:3px 0;color:var(--muted);background:var(--panel2);border-radius:0 5px 5px 0}
  .trace-step b{color:var(--txt)}
  .legend{position:absolute;left:14px;bottom:12px;font-size:11px;color:var(--muted);
    background:rgba(13,17,23,.8);border:1px solid var(--line);border-radius:7px;padding:8px 10px}
  .legend .row{display:flex;align-items:center;gap:6px;margin:2px 0}
  .swatch{width:22px;height:4px;border-radius:2px}
  .colhead{fill:var(--muted);font-size:11px;font-weight:600;letter-spacing:.04em}
  .hint{font-size:11px;color:var(--muted)}
  .node rect{transition:fill .2s,stroke .2s}
  .node text{font-size:11.5px;fill:var(--txt);pointer-events:none}
  .node .sub{font-size:9px;fill:var(--muted)}
  .node{cursor:pointer}
  .badge{font-size:9px;fill:#d29922}
</style>
</head>
<body>
<header>
  <h1>🛰 操作トレース可視化システム</h1>
  <span class="tag">UIモックアップ / Northwind ローカル開発環境</span>
  <span class="tag">※ ダミーデータでの見た目確認用</span>
  <div class="modes">
    <button id="m-rt" class="on" onclick="setMode('rt')">● リアルタイム</button>
    <button id="m-hist" onclick="setMode('hist')">▦ 履歴（集計）</button>
  </div>
</header>

<div class="toolbar">
  <div class="grp" id="rt-tools">
    <span class="lbl">操作をシミュレート ▶</span>
    <div class="actions" id="action-btns"></div>
  </div>
  <div class="grp" id="hist-tools" style="display:none">
    <span class="lbl">時間窓 ▶</span>
    <div class="windows" id="window-btns"></div>
  </div>
</div>

<main>
  <div class="stage">
    <svg id="svg" viewBox="0 0 1320 720" preserveAspectRatio="xMidYMid meet"></svg>
    <canvas id="fx"></canvas>
    <div class="legend" id="legend"></div>
  </div>
  <aside>
    <h2>詳細パネル</h2>
    <div class="detail" id="detail">ノードまたはエッジをクリックすると、実体（ファイル・関数・SQL・所要時間）を表示します。</div>
    <div class="trace-log" id="tracelog"></div>
  </aside>
</main>

<script>
// ===== ノード定義（実際の Northwind コード構造に対応） =====
const COLS = ["画面","fetch","CORS","認証","ハンドラ関数","db.py","psycopg2","テーブル"];
const N = {
  // col 0: 画面
  catalog:{c:0,l:"catalog.html",s:"商品一覧画面"},
  checkout:{c:0,l:"checkout.html",s:"注文確定画面"},
  inventory:{c:0,l:"inventory.html",s:"在庫管理(admin)"},
  dashPage:{c:0,l:"dashboard.html",s:"ダッシュボード(admin)"},
  login:{c:0,l:"login.html",s:"ログイン画面"},
  // col 1
  fetch:{c:1,l:"fetch()",s:"web/js/api.js"},
  // col 2
  cors:{c:2,l:"CORS MW",s:"main.py:29"},
  // col 3
  auth:{c:3,l:"_require_token",s:"Bearer照合"},
  // col 4: handlers
  h_list:{c:4,l:"list_products",s:"GET /api/products"},
  h_adj:{c:4,l:"adjust_stock",s:"POST /inventory/adjust"},
  h_order:{c:4,l:"create_order",s:"POST /api/orders"},
  h_dash:{c:4,l:"dashboard",s:"GET /api/dashboard"},
  h_slogin:{c:4,l:"store_login",s:"POST /auth/store"},
  // col 5
  db:{c:5,l:"db.py",s:"fetch_all/execute"},
  // col 6
  pg:{c:6,l:"psycopg2",s:"PG ドライバ"},
  // col 7: tables
  t_products:{c:7,l:"products",s:"商品"},
  t_categories:{c:7,l:"categories",s:"カテゴリ"},
  t_suppliers:{c:7,l:"suppliers",s:"仕入先"},
  t_orders:{c:7,l:"orders",s:"注文"},
  t_details:{c:7,l:"order_details",s:"注文明細"},
  t_customers:{c:7,l:"customers",s:"顧客"},
};

// 詳細情報（クリック時表示）— IT初心者向けのリッチ解説つき
// one=一言 / easy=やさしい説明(<span class=term>用語</span>で注釈) / terms=用語集[語,読み,意味] / f=実体 / sql=実SQL
const DETAIL = {
  catalog:{k:"画面 (HTML)",f:"src/web/store/catalog.html",
    one:"あなたが今“見ている”画面そのもの。商品が並ぶWebページです。",
    easy:"<span class='term' title='Webページの見た目・構造を書くための言語'>HTML</span>は“ページの設計図”で、文字やボタンの置き場所を決めます。ただしHTMLだけでは中身のデータ（実際の商品名や価格）は持っていません。<b>空っぽの棚を並べた“ガワ”</b>だと思ってください。棚に商品を並べるのは後ろにいるサーバーの仕事です。ボタンを押すと、ページに仕込まれた<span class='term' title='ブラウザの中で動く小さなプログラム。操作に反応する'>JavaScript</span>が動き、サーバーへ「商品データちょうだい」と問い合わせます。",
    terms:[["HTML","エイチティーエムエル","Webページの構造・見た目を書く言語。"],["JavaScript","ジャバスクリプト","ブラウザ内で動くプログラム言語。ボタン操作などに反応する。"],["ブラウザ","―","Chrome等、Webページを表示するソフト。"]]},
  checkout:{k:"画面 (HTML)",f:"src/web/store/checkout.html",
    one:"カートの中身を確定して“注文”をサーバーへ送る画面。",
    easy:"ここで「注文する」を押すと、カートに入れた商品リストがまとめてサーバーへ送られます。今までは「データをもらう」方向でしたが、ここは逆に<b>ブラウザからサーバーへデータを“預ける”</b>操作で、これを<span class='term' title='サーバーへデータを送って新規作成・登録するHTTPの操作'>POST</span>と呼びます。",
    terms:[["POST","ポスト","サーバーへデータを送って登録・作成する通信の種類。逆に“もらう”のはGET。"],["カート","―","購入予定の商品を一時的にためる仕組み。ここではブラウザ側で保持。"]]},
  inventory:{k:"画面 (HTML)",f:"src/web/admin/inventory.html",
    one:"社内担当者が在庫数を増減させる“管理用”画面。",
    easy:"お客様用ではなく<b>“中の人”用</b>の画面です。誰でも勝手に在庫を変えられては困るので、この操作には<span class='term' title='「あなたは誰か」を確認する仕組み'>認証</span>（ログイン）が必要です。ログイン済みであることを示す“通行証”を通信に添えて送ります。",
    terms:[["認証","にんしょう","「あなたは誰か」を確認する仕組み。ログインがこれ。"],["admin","アドミン","管理者・運営側のこと。お客様(顧客)と区別される。"]]},
  dashPage:{k:"画面 (HTML)",f:"src/web/admin/dashboard.html",
    one:"商品数・注文数・在庫アラートなどを“まとめて”見る集計画面。",
    easy:"この画面は開いた瞬間に複数の情報を一気に取りに行きます。<b>1回のクリックでも、裏では「在庫が少ない商品は？」「最近の注文は？」など複数の問い合わせが同時に飛ぶ</b>良い例です。だから本システムは「1クリック＝1まとまり」で束ねて見せます。",
    terms:[["集計","しゅうけい","たくさんのデータを数えたり合計して要約すること。"],["ダッシュボード","―","車のメーターのように重要数値を一望できる画面。"]]},
  login:{k:"画面 (HTML)",f:"src/web/store/login.html",
    one:"顧客IDを入れてログインする“入口”の画面。",
    easy:"入力したIDが正しいかをサーバーが確かめ、OKなら<span class='term' title='ログイン成功の証となるランダムな文字列の通行証'>トークン</span>（通行証）を発行します。以降の操作ではこの通行証を見せることで「ログイン済み」と認識されます。",
    terms:[["トークン","―","ログイン成功の証として発行されるランダムな文字列の通行証。毎回の通信に添える。"],["ID","アイディー","利用者を一意に識別する番号や記号。"]]},
  fetch:{k:"通信の出発点 (JavaScript)",f:"src/web/js/api.js",
    one:"ブラウザからサーバーへ“電話をかける”係。すべての通信の出発点。",
    easy:"<span class='term' title='ブラウザからサーバーへ通信するJavaScriptの命令'>fetch</span>は「このデータちょうだい」「これ登録して」とサーバーにお願いする命令です。本システムでは<b>ここに細工をして、毎回の通信に“この通信はあなたのどのクリックから始まったか”という荷札（<span class='term' title='一連の処理を追跡するための共通の番号'>trace_id</span>）を付けます</b>。荷札を全工程で持ち回ることで、後から「このクリック→この通信→このSQL」と1本の線でつなげられます。これが<b>トレース（追跡）の肝</b>です。",
    terms:[["fetch","フェッチ","ブラウザからサーバーへ通信するJavaScriptの命令。"],["HTTP","エイチティーティーピー","ブラウザとサーバーが会話するための“共通語”の取り決め。"],["API","エーピーアイ","プログラム同士がやり取りする“窓口”の決まりごと。"],["trace_id","トレースアイディー","一連の処理に付ける追跡用の荷札番号。"]]},
  cors:{k:"ミドルウェア（門番）",f:"src/api/main.py:29 CORSMiddleware",
    one:"サーバーの“受付・門番”。届いた通信を最初に検査する共通処理。",
    easy:"<span class='term' title='本来の処理に届く前に必ず通る共通の“関所”'>ミドルウェア</span>は、依頼が担当者に届く前に必ず通る“通路の関所”です。<span class='term' title='違うWebサイト間の通信を許可/制限するブラウザの安全ルール'>CORS</span>は「どのWebサイトからのアクセスならOKか」を判断する安全装置で、<b>悪意あるサイトから勝手にデータを抜かれるのを防ぎます</b>。開発中は全部許可していますが、本番では絞ります。",
    terms:[["ミドルウェア","―","処理の前後に共通で挟み込む“関所”のような部品。"],["CORS","コルス","違うドメイン間の通信を許可・制限するブラウザの安全ルール。"],["リクエスト","―","ブラウザからサーバーへの“お願い”1件。"],["オリジン","―","通信元のWebサイトの住所（ドメイン）。"]]},
  auth:{k:"認証（改札）",f:"src/api/main.py:52 _require_token",
    one:"通行証（トークン）を確認する“改札”。",
    easy:"在庫変更や注文など<b>“誰がやったか”が重要な操作の前に立つ改札</b>です。通信に添えられたトークンが、サーバーが覚えているログイン情報（<span class='term' title='ログイン中という状態をサーバー側で記憶していること'>セッション</span>）と一致するか照合します。不一致なら門前払い（<span class='term' title='「認証が必要・失敗」を表すHTTPの番号'>401エラー</span>）。逆に商品一覧のような“誰でも見てよい”<span class='term' title='ログイン無しで誰でも呼べる窓口'>公開API</span>はこの改札を通りません。モックで🛒や🔑が認証ノードを飛ばすのはこのためです。",
    terms:[["トークン","―","通行証となるランダムな文字列。"],["401","よんまるいち","「認証が必要・失敗」を表すHTTPの番号（エラーコード）。"],["セッション","―","ログイン中という状態をサーバーが覚えていること。"],["公開API","こうかいエーピーアイ","ログイン無しで誰でも呼べる窓口。"]]},
  h_list:{k:"APIハンドラ（担当プログラム）",f:"src/api/main.py:125 list_products()",
    one:"「商品一覧ください」に応える担当プログラム（関数）。",
    easy:"<span class='term' title='“この住所に頼めばこの仕事をする”という窓口。例 /api/products'>エンドポイント</span> /api/products に来た依頼を受け、データベースへ「商品＋カテゴリ＋仕入先をひとまとめにして」と問い合わせる<span class='term' title='データベースに命令する専用の言語'>SQL</span>を組み立てます。複数の表を“のりづけ”して1つの結果にすることを<span class='term' title='複数の表を共通項目でつなげる操作'>JOIN（結合）</span>と言います。",
    terms:[["関数","かんすう","ひとまとまりの処理に名前を付けたプログラムの単位。"],["エンドポイント","―","API窓口の住所。例 /api/products。"],["SQL","エスキューエル","データベースに命令するための言語。"],["JOIN","ジョイン","複数の表を共通項目でつなげて1つにする操作。"]],
    sql:"SELECT p.*, c.category_name, s.company_name\nFROM products p\nLEFT JOIN categories c ON p.category_id=c.category_id\nLEFT JOIN suppliers s ON p.supplier_id=s.supplier_id"},
  h_adj:{k:"APIハンドラ（担当プログラム）",f:"src/api/main.py:199 adjust_stock()",
    one:"在庫数を増やす/減らす担当プログラム（要ログイン）。",
    easy:"まず現在の在庫を<span class='term' title='データを読み出すSQL命令'>SELECT</span>で読み、増減後の値を計算し、<b>マイナスにならないか確認(<span class='term' title='入力や結果が正しいか検査すること'>バリデーション</span>)してから</b><span class='term' title='既存データを書き換えるSQL命令'>UPDATE</span>で書き換えます。“読んでから書く”の2段構えです。",
    terms:[["SELECT","セレクト","データを“読み出す”SQL命令。"],["UPDATE","アップデート","既存データを“書き換える”SQL命令。"],["バリデーション","―","入力や結果が妥当か検査すること。ここでは在庫が負にならないか。"]],
    sql:"SELECT units_in_stock FROM products WHERE product_id=%s;\nUPDATE products SET units_in_stock=%s WHERE product_id=%s"},
  h_order:{k:"APIハンドラ（担当プログラム）",f:"src/api/main.py:290 create_order()",
    one:"注文を確定し、在庫を減らす担当プログラム（システムで一番“重い”処理）。",
    easy:"1回の注文で複数のことが連鎖します：注文ヘッダを作り(<span class='term' title='新しいデータを追加するSQL命令'>INSERT</span> orders)、商品ごとに<span class='term' title='注文内の商品1行ごとの内訳'>明細</span>を作り(INSERT order_details)、その分だけ在庫を減らす(UPDATE products)。本来はこれらが<b>全部成功するか・全部取り消すか</b>をまとめる<span class='term' title='一連の書き込みを“全部成功 or 全部なかったこと”にする仕組み'>トランザクション</span>が重要になります。",
    terms:[["INSERT","インサート","新しいデータを“追加する”SQL命令。"],["トランザクション","―","一連の書き込みを“全部成功 or 全部なかったこと”にまとめる仕組み。"],["明細","めいさい","注文の中の商品1行ごとの内訳（数量・単価）。"]],
    sql:"INSERT INTO orders (...) VALUES (...);\nINSERT INTO order_details (...) VALUES (...);  -- 明細数ぶん繰り返す\nUPDATE products SET units_in_stock = units_in_stock - %s ..."},
  h_dash:{k:"APIハンドラ（担当プログラム）",f:"src/api/main.py:358 dashboard()",
    one:"ダッシュボード1画面分の数字をまとめて作る担当プログラム。",
    easy:"商品数・注文数・在庫アラート・最近の注文…を、<b>複数のSQLを連続実行</b>して1つのまとまり(<span class='term' title='プログラム間でデータを受け渡す軽量な書式'>JSON</span>)にして返します。1クリックが多数の問い合わせを生む典型で、「1操作＝1トレース」で束ねる意味がよく分かる箇所です。",
    terms:[["JSON","ジェイソン","プログラム間でデータを受け渡す軽量な書式。{名前:値}の形。"],["COUNT","カウント","件数を数えるSQLの関数。"],["集約","しゅうやく","合計・件数などにまとめる計算。"]],
    sql:"SELECT COUNT(*) FROM products WHERE discontinued=0;\nSELECT COUNT(*) FROM orders;\nSELECT ... FROM orders JOIN customers JOIN order_details ...;\nSELECT ... FROM products WHERE units_in_stock <= reorder_level"},
  h_slogin:{k:"APIハンドラ（担当プログラム）",f:"src/api/main.py:96 store_login()",
    one:"ログインの可否を判定し、通行証を“発行”する担当プログラム。",
    easy:"送られた顧客IDが customers 表にあるか<span class='term' title='入力が登録内容と一致するか突き合わせること'>照合</span>し、合っていればトークンを作って返します。<b>“改札(認証)”が通行証を『確認』する側なのに対し、ここは通行証を『発行』する側</b>。役割が逆なので、認証ノードを通らずに認証情報を作ります。",
    terms:[["照合","しょうごう","入力が登録内容と一致するか突き合わせること。"],["トークン","―","発行される通行証文字列。"],["認証情報","にんしょうじょうほう","ログインの証となるデータ。"]],
    sql:"SELECT customer_id, company_name, contact_name, ...\nFROM customers WHERE customer_id = %s"},
  db:{k:"DBアクセス層（橋渡し）",f:"src/api/db.py",
    one:"サーバーとデータベースの“通訳・橋渡し”をする共通部品。",
    easy:"各担当プログラムはSQLの文字列を作るだけ。それを実際に<span class='term' title='データを整理して保管・検索する専用ソフト'>データベース</span>へ送り結果を受け取る泥仕事を、この db.py が肩代わりします。<b>fetch_all=複数行取得／fetch_one=1行取得／execute=書き込み実行</b>、と役割が分かれています。",
    terms:[["データベース","でーたべーす","データを整理して保管・検索する専用ソフト。略してDB。"],["モジュール","―","機能ごとにまとめたプログラムの部品。"],["コネクション","―","アプリとDBの間に張る通信の“線”。"]]},
  pg:{k:"ドライバ（翻訳機）",f:"psycopg2",
    one:"PythonからPostgreSQLへ実際に話しかける“専用翻訳機”。",
    easy:"ブラウザがDBと直接話せないのは、DBの言葉(<span class='term' title='通信の手順・約束事'>プロトコル</span>)を喋れないからです。psycopg2はPythonにその言葉を教える<span class='term' title='特定のソフト/機器と通信するための専用変換プログラム'>ドライバ</span>。<span class='term' title='1台のPC内で通信窓口を区別する番号'>ポート</span>5432の<span class='term' title='高機能な無料のデータベースソフト'>PostgreSQL</span>に接続し、SQLを送って結果を持ち帰ります。",
    terms:[["ドライバ","―","特定のソフト/機器と通信するための専用変換プログラム。"],["PostgreSQL","ポストグレスキューエル","高機能な無料のデータベースソフト。"],["プロトコル","―","通信の手順・約束事。"],["ポート","―","5432など、1台のPC内で通信窓口を区別する番号。"]]},
  t_products:{k:"テーブル（表）",f:"northwind.products",
    one:"商品マスタ。名前・価格・在庫数などの“商品台帳”。",
    easy:"<span class='term' title='行と列でデータを格納するDBの基本単位'>テーブル</span>は表のこと。<span class='term' title='滅多に増減しない基準データ。商品・顧客など'>マスタ</span>とは“台帳”データで、注文のたびに在庫数の<span class='term' title='表の縦の項目'>カラム（列）</span>が書き換わります。",
    terms:[["テーブル","―","行と列でデータを格納するDBの基本単位＝表。"],["マスタ","―","基準となる台帳データ。商品・顧客など滅多に増減しない。"],["カラム","―","表の縦＝1項目（列）。"]]},
  t_categories:{k:"テーブル（表）",f:"northwind.categories",
    one:"商品の分類（飲料・菓子など）の台帳。",
    easy:"商品を“どのジャンルか”で束ねる小さなマスタです。products 表が category_id という番号でこの表を指し示し、JOINで分類名を引いてきます。",
    terms:[["マスタ","―","基準となる台帳データ。"],["JOIN","ジョイン","複数の表を共通項目でつなげる操作。"]]},
  t_suppliers:{k:"テーブル（表）",f:"northwind.suppliers",
    one:"商品の仕入先企業の台帳。",
    easy:"「この商品はどの会社から仕入れているか」を管理するマスタ。products が supplier_id でこの表とつながります。",
    terms:[["マスタ","―","基準となる台帳データ。"]]},
  t_orders:{k:"テーブル（表）",f:"northwind.orders",
    one:"注文1件ごとのヘッダ情報（誰が・いつ・どこへ）。",
    easy:"日々増えていく<span class='term' title='取引のたびに増える記録データ'>トランザクションデータ</span>です。各行は order_id という<span class='term' title='各行をひとつに識別する列'>主キー</span>で区別されます。",
    terms:[["トランザクションデータ","―","取引のたびに増えていく記録（注文・明細など）。マスタの対義。"],["主キー","しゅキー","各行を一意に識別する列。orders なら order_id。"]]},
  t_details:{k:"テーブル（表）",f:"northwind.order_details",
    one:"注文の中の商品1行ごとの明細（数量・単価・割引）。",
    easy:"1つの注文に複数商品があるので、ヘッダ(orders)と分けて“1商品＝1行”で持ちます。order_id という<span class='term' title='他の表の行を指し示す列'>外部キー</span>で orders とつながります。",
    terms:[["外部キー","がいぶキー","他の表の行を指し示す列。order_id で orders とつながる。"],["明細","めいさい","注文内の商品1行ごとの内訳。"]]},
  t_customers:{k:"テーブル（表）",f:"northwind.customers",
    one:"顧客企業の台帳。ECではこれがログインアカウントを兼ねる。",
    easy:"91社の顧客マスタ。このシステムでは<b>顧客ID＝ログインID</b>として使われ、store_login がここを照合します。",
    terms:[["マスタ","―","基準となる台帳データ。"]]},
};

// ===== 操作（アクション）＝ 1クリックで起きる経路 =====
const ACTIONS = [
  {id:"a1",label:"🛒 商品一覧を開く",color:"#2dd4bf",w:50,
   spine:["catalog","fetch","cors","h_list","db","pg"],
   tables:["t_products","t_categories","t_suppliers"], auth:false},
  {id:"a4",label:"📊 ダッシュボード表示",color:"#a78bfa",w:20,
   spine:["dashPage","fetch","cors","auth","h_dash","db","pg"],
   tables:["t_products","t_orders","t_details","t_customers","t_categories"], auth:true},
  {id:"a5",label:"🔑 ログイン",color:"#4ade80",w:10,
   spine:["login","fetch","cors","h_slogin","db","pg"],
   tables:["t_customers"], auth:false},
  {id:"a2",label:"📦 在庫を調整",color:"#fbbf24",w:8,
   spine:["inventory","fetch","cors","auth","h_adj","db","pg"],
   tables:["t_products"], auth:true},
  {id:"a3",label:"🧾 注文を確定",color:"#f472b6",w:5,
   spine:["checkout","fetch","cors","auth","h_order","db","pg"],
   tables:["t_orders","t_details","t_products"], auth:true},
];

// ===== レイアウト =====
const W=1320,H=720, NW=128, NH=36;
const colX = c => 100 + c*((1160-100)/7);
function layout(){
  const byCol={};
  Object.entries(N).forEach(([id,n])=>{(byCol[n.c]=byCol[n.c]||[]).push(id)});
  Object.values(byCol).forEach(ids=>{
    const gap=Math.min(100,(H-120)/Math.max(ids.length-1,1));
    const startY=(H-(ids.length-1)*gap)/2;
    ids.forEach((id,i)=>{N[id].x=colX(N[id].c); N[id].y=startY+i*gap;});
  });
}
layout();

// 全エッジ（静的マップ＝全アクションの和集合）
function actionEdges(a){
  const e=[];
  for(let i=0;i<a.spine.length-1;i++) e.push([a.spine[i],a.spine[i+1]]);
  const last=a.spine[a.spine.length-1];
  a.tables.forEach(t=>e.push([last,t]));
  return e;
}
const EDGEKEY=(u,v)=>u+">"+v;
const allEdges={};
ACTIONS.forEach(a=>actionEdges(a).forEach(([u,v])=>{
  const k=EDGEKEY(u,v);
  if(!allEdges[k]) allEdges[k]={u,v,base:0};
  allEdges[k].base+=a.w;
}));

// ===== 履歴用ダミー集計（時間窓ごと） =====
const WINDOWS=[["10分",1],["1時間",6],["1日",132],["1週",880],["1月",3760],["1年",44000]];
let curWin=0, mode="rt";
function seeded(s){let x=Math.sin(s)*10000;return x-Math.floor(x);}
function windowCount(edgeKey,winFactor,idx){
  const e=allEdges[edgeKey];
  const j=0.8+0.4*seeded(idx*7+curWin*13);
  return Math.round(e.base*winFactor*j);
}

// ===== SVG 描画 =====
const svg=document.getElementById("svg");
const NS="http://www.w3.org/2000/svg";
function el(t,a){const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;}
function edgePath(u,v){
  const a=N[u],b=N[v];
  const x1=a.x+NW/2,y1=a.y, x2=b.x-NW/2,y2=b.y;
  const mx=(x1+x2)/2;
  return `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`;
}
let edgeEls={};
function drawStatic(){
  svg.innerHTML="";
  // 列見出し＋帯
  COLS.forEach((c,i)=>{
    const x=colX(i);
    svg.appendChild(el("rect",{x:x-NW/2-8,y:24,width:NW+16,height:H-44,rx:10,
      fill:i%2?"#11161d":"#0f141b",opacity:.5}));
    const t=el("text",{x:x,y:18,"text-anchor":"middle",class:"colhead"});t.textContent=c;svg.appendChild(t);
  });
  // エッジ
  edgeEls={};
  Object.entries(allEdges).forEach(([k,e])=>{
    const p=el("path",{d:edgePath(e.u,e.v),fill:"none",stroke:"#30363d","stroke-width":1.5,
      "stroke-linecap":"round",opacity:.55});
    p.style.cursor="pointer";
    p.addEventListener("click",ev=>{ev.stopPropagation();showEdge(k);});
    svg.appendChild(p); edgeEls[k]=p;
  });
  // ノード
  Object.entries(N).forEach(([id,n])=>{
    const g=el("g",{class:"node"});
    g.addEventListener("click",ev=>{ev.stopPropagation();showNode(id);});
    const r=el("rect",{x:n.x-NW/2,y:n.y-NH/2,width:NW,height:NH,rx:8,
      fill:"#1c2230",stroke:"#3a4252","stroke-width":1.2});
    n._rect=r;
    const t1=el("text",{x:n.x,y:n.y-1,"text-anchor":"middle"});t1.textContent=n.l;
    const t2=el("text",{x:n.x,y:n.y+11,"text-anchor":"middle",class:"sub"});t2.textContent=n.s;
    g.appendChild(r);g.appendChild(t1);g.appendChild(t2);svg.appendChild(g);
  });
  if(mode==="hist") paintHistory();
}
svg.addEventListener("click",()=>{}); // 背景

// ===== 履歴モード：太さ＋ヒートマップ =====
function heat(t){ // 0..1 -> blue->yellow->red
  const c1=[56,139,255],c2=[210,153,34],c3=[248,81,73];
  let a,b,f;
  if(t<.5){a=c1;b=c2;f=t/.5;}else{a=c2;b=c3;f=(t-.5)/.5;}
  return `rgb(${a.map((v,i)=>Math.round(v+(b[i]-v)*f)).join(",")})`;
}
function paintHistory(){
  const factor=WINDOWS[curWin][1];
  const counts={}; let mx=1,mn=1e9;
  Object.keys(allEdges).forEach((k,i)=>{const c=windowCount(k,factor,i);counts[k]=c;mx=Math.max(mx,c);mn=Math.min(mn,c);});
  Object.entries(edgeEls).forEach(([k,p])=>{
    const c=counts[k];
    const t=(Math.log(c+1)-Math.log(mn+1))/(Math.log(mx+1)-Math.log(mn+1)||1);
    p.setAttribute("stroke",heat(t));
    p.setAttribute("stroke-width",1.5+t*11);
    p.setAttribute("opacity",.85);
  });
}
function clearHistoryPaint(){
  Object.values(edgeEls).forEach(p=>{p.setAttribute("stroke","#30363d");
    p.setAttribute("stroke-width",1.5);p.setAttribute("opacity",.55);});
}

// ===== リアルタイム：粒子アニメ =====
const fx=document.getElementById("fx"); const ctx=fx.getContext("2d");
let particles=[], raf=null;
function resizeFx(){
  const r=svg.getBoundingClientRect();
  fx.width=r.width; fx.height=r.height; fx.style.width=r.width+"px"; fx.style.height=r.height+"px";
  fx._sx=r.width/W; fx._sy=r.height/H;
}
window.addEventListener("resize",resizeFx);
function nodePt(id,side){const n=N[id];return{x:(n.x+(side||0)*NW/2),y:n.y};}
function bez(p0,p1,p2,p3,t){
  const u=1-t;
  return{
    x:u*u*u*p0.x+3*u*u*t*p1.x+3*u*t*t*p2.x+t*t*t*p3.x,
    y:u*u*u*p0.y+3*u*u*t*p1.y+3*u*t*t*p2.y+t*t*t*p3.y
  };
}
function fireAction(a){
  // エッジ強調＋粒子
  const edges=actionEdges(a);
  // ハイライト経路
  edges.forEach(([u,v])=>{const p=edgeEls[EDGEKEY(u,v)];
    if(p){p.setAttribute("stroke",a.color);p.setAttribute("stroke-width",3);p.setAttribute("opacity",1);}});
  Object.values(N).forEach(n=>n._rect.setAttribute("stroke","#3a4252"));
  a.spine.concat(a.tables).forEach(id=>{N[id]._rect.setAttribute("stroke",a.color);N[id]._rect.setAttribute("fill","#243044");});
  // 粒子を列順（左→右）に波及
  const now=performance.now();
  edges.forEach(([u,v])=>{
    const startCol=N[u].c;
    const a0=nodePt(u,1),a3=nodePt(v,-1);
    const mx=(a0.x+a3.x)/2;const a1={x:mx,y:a0.y},a2={x:mx,y:a3.y};
    for(let s=0;s<3;s++){
      particles.push({a0,a1,a2,a3,color:a.color,
        start:now+startCol*260+s*90,dur:520});
    }
  });
  // トレースログ
  renderTrace(a);
  showActionDetail(a);
  if(!raf) loop();
  // 一定時間後にハイライト解除
  clearTimeout(fireAction._t);
  fireAction._t=setTimeout(()=>{if(mode==="rt"){clearHistoryPaint();
    Object.values(N).forEach(n=>{n._rect.setAttribute("stroke","#3a4252");n._rect.setAttribute("fill","#1c2230");});}},3000);
}
function loop(){
  const now=performance.now();
  ctx.clearRect(0,0,fx.width,fx.height);
  const sx=fx._sx,sy=fx._sy;
  particles=particles.filter(p=>now<p.start+p.dur);
  particles.forEach(p=>{
    if(now<p.start)return;
    const t=(now-p.start)/p.dur;
    const pt=bez(p.a0,p.a1,p.a2,p.a3,t);
    const x=pt.x*sx,y=pt.y*sy;
    ctx.beginPath();ctx.arc(x,y,4.2,0,7);ctx.fillStyle=p.color;
    ctx.shadowColor=p.color;ctx.shadowBlur=12;ctx.fill();ctx.shadowBlur=0;
  });
  if(particles.length||mode==="rt") raf=requestAnimationFrame(loop); else {raf=null;ctx.clearRect(0,0,fx.width,fx.height);}
}

// ===== 詳細パネル =====
function showNode(id){
  const d=DETAIL[id]; if(!d)return;
  let html=`<div class="k">${d.k}</div><div class="title">${N[id].l}</div>`;
  if(d.one) html+=`<div class="onebox">💡 ${d.one}</div>`;
  if(d.easy) html+=`<div class="easy">${d.easy}</div>`;
  html+=`<div><span class="k">対応する実体：</span><code>${d.f}</code></div>`;
  if(d.sql) html+=`<div style="margin-top:8px"><span class="k">実際に流れるSQL：</span><div class="sql">${d.sql}</div></div>`;
  if(d.terms&&d.terms.length){
    html+=`<div class="glossary"><div class="gh">📖 用語メモ（注釈）</div><dl>`;
    d.terms.forEach(([t,r,m])=>{
      html+=`<dt>${t}${r&&r!=="―"?`<span class="read">${r}</span>`:""}</dt><dd>${m}</dd>`;
    });
    html+=`</dl></div>`;
  }
  html+=`<div class="metrics">📈 ダミー実績 — 直近1時間: 呼び出し ${Math.round(seeded(id.length*3)*900+40)} 回 ／ 平均 ${(seeded(id.length)*30+2).toFixed(1)} ms</div>`;
  document.getElementById("detail").innerHTML=html;
}
function showEdge(k){
  const e=allEdges[k];
  const c10=windowCount(k,1,0), c1h=windowCount(k,6,1), c1d=windowCount(k,132,2);
  document.getElementById("detail").innerHTML=
    `<div class="k">経路（エッジ）</div>
     <div style="font-size:14px;margin:6px 0"><b>${N[e.u].l}</b> → <b>${N[e.v].l}</b></div>
     <div class="hint">この道がどれだけ通されたか（ダミー）：</div>
     <div style="margin-top:6px">直近10分 <b>${c10}</b> 回<br>直近1時間 <b>${c1h}</b> 回<br>直近1日 <b>${c1d}</b> 回</div>`;
}
function showActionDetail(a){
  document.getElementById("detail").innerHTML=
    `<div class="k">操作（1クリック＝1トレース）</div>
     <div style="font-size:15px;margin:6px 0"><b>${a.label}</b></div>
     <div class="hint">trace_id = ${Math.random().toString(36).slice(2,10)}</div>
     <div style="margin-top:8px">${a.auth?"🔒 認証あり（_require_token を通過）":"🔓 公開API（認証スキップ）"}</div>
     <div style="margin-top:6px">対象テーブル：${a.tables.map(t=>"<code>"+N[t].l+"</code>").join(" ")}</div>`;
}
function renderTrace(a){
  const steps=a.spine.map((id,i)=>{
    const n=N[id];
    return `<div class="trace-step"><b>${String(i+1).padStart(2,"0")}</b> ${COLS[n.c]} ／ <b>${n.l}</b> <span style="color:#8b949e">${n.s}</span></div>`;
  }).join("");
  const tbl=`<div class="trace-step"><b>${String(a.spine.length+1).padStart(2,"0")}</b> テーブル ／ <b>${a.tables.map(t=>N[t].l).join(", ")}</b></div>`;
  document.getElementById("tracelog").innerHTML=
    `<h2>トレース連鎖（直近の1操作）</h2>${steps}${tbl}`;
}

// ===== モード切替 =====
function setMode(m){
  mode=m;
  document.getElementById("m-rt").classList.toggle("on",m==="rt");
  document.getElementById("m-hist").classList.toggle("on",m==="hist");
  document.getElementById("rt-tools").style.display=m==="rt"?"flex":"none";
  document.getElementById("hist-tools").style.display=m==="hist"?"flex":"none";
  renderLegend();
  if(m==="hist"){ if(raf){cancelAnimationFrame(raf);raf=null;} ctx.clearRect(0,0,fx.width,fx.height);
    Object.values(N).forEach(n=>{n._rect.setAttribute("stroke","#3a4252");n._rect.setAttribute("fill","#1c2230");});
    paintHistory();
    document.getElementById("tracelog").innerHTML="";
    document.getElementById("detail").innerHTML="時間窓を切り替えると、各経路の <b>通過量</b> が線の太さ・色（ヒート）で変わります。線をクリックで回数表示。";
  }else{ clearHistoryPaint(); resizeFx(); loop();
    document.getElementById("detail").innerHTML="上の操作ボタンを押すと、その1クリックが起こす経路に <b>粒子</b> が流れます。";
  }
}
function setWindow(i){curWin=i;
  document.querySelectorAll("#window-btns button").forEach((b,j)=>b.classList.toggle("on",j===i));
  paintHistory();}

function renderLegend(){
  const lg=document.getElementById("legend");
  if(mode==="rt"){
    lg.innerHTML=`<div style="margin-bottom:4px;color:#e6edf3">凡例（リアルタイム）</div>`+
      ACTIONS.map(a=>`<div class="row"><span class="swatch" style="background:${a.color}"></span>${a.label}</div>`).join("");
  }else{
    lg.innerHTML=`<div style="margin-bottom:4px;color:#e6edf3">凡例（通過量ヒート）</div>
      <div class="row"><span class="swatch" style="background:${heat(0)}"></span>少ない</div>
      <div class="row"><span class="swatch" style="background:${heat(.5)}"></span>中</div>
      <div class="row"><span class="swatch" style="background:${heat(1)}"></span>多い</div>
      <div class="row hint">線の太さ＝通過回数</div>`;
  }
}

// ===== 初期化 =====
function init(){
  drawStatic();
  const ab=document.getElementById("action-btns");
  ACTIONS.forEach(a=>{const b=document.createElement("button");b.textContent=a.label;
    b.style.borderLeft="3px solid "+a.color;b.onclick=()=>fireAction(a);ab.appendChild(b);});
  const wb=document.getElementById("window-btns");
  WINDOWS.forEach((w,i)=>{const b=document.createElement("button");b.textContent=w[0];
    if(i===0)b.classList.add("on");b.onclick=()=>setWindow(i);wb.appendChild(b);});
  resizeFx(); renderLegend(); loop();
}
window.addEventListener("load",init);
setTimeout(resizeFx,300);
</script>
